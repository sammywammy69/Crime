<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Crime Heatmap</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--panel:#060610;--border:#1a1a2e;--red:#ff2244;--orange:#ff6600;--text:#e8e8f0;--muted:#44445a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px;border-bottom:1px solid var(--border);
  background:#05050f;
}
.logo{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;letter-spacing:3px;color:var(--red);}
.logo span{color:var(--text);}
.hdr-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.hdr-hint{font-size:10px;color:var(--muted);letter-spacing:1px;text-align:right;line-height:1.8;}
.hdr-hint span{color:var(--red);}

.main{display:flex;flex:1;overflow:hidden;}

#map-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:10px;}
svg#map{width:100%;height:100%;max-height:calc(100vh - 60px);}

.s-path{stroke:#0d0d1d;stroke-width:0.6;transition:stroke 0.15s,filter 0.15s;cursor:pointer;}
.s-path:hover{stroke:var(--red);stroke-width:1.8;filter:brightness(1.5);}
.s-path.active{stroke:var(--red);stroke-width:2;filter:brightness(1.6);}

/* sidebar */
#sidebar{
  width:290px;background:#06060f;border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-head{padding:18px 20px;border-bottom:1px solid var(--border);}
.sb-head h2{font-family:'Rajdhani';font-size:20px;font-weight:700;letter-spacing:2px;color:var(--red);}
.sb-head p{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:3px;}
#sb-body{flex:1;overflow-y:auto;padding:16px;}
#sb-body::-webkit-scrollbar{width:3px;}
#sb-body::-webkit-scrollbar-thumb{background:var(--border);}

.ph{text-align:center;color:var(--muted);font-size:11px;margin-top:50px;line-height:2;}
.ph-icon{font-size:32px;color:#1a1a2e;display:block;margin-bottom:10px;}

.sb-state{font-family:'Rajdhani';font-size:24px;font-weight:700;letter-spacing:2px;color:var(--text);margin-bottom:2px;}
.sb-total{font-size:34px;font-weight:500;color:var(--red);margin:10px 0 2px;}
.sb-lbl{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}

.bar-row{margin:5px 0;}
.bar-meta{display:flex;justify-content:space-between;font-size:9px;margin-bottom:2px;}
.bar-meta .bn{color:var(--muted);text-transform:uppercase;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px;}
.bar-meta .bv{color:var(--text);font-weight:500;}
.bar-t{height:2px;background:var(--border);border-radius:1px;}
.bar-f{height:2px;background:linear-gradient(90deg,var(--orange),var(--red));border-radius:1px;}

.go-btn{
  margin:14px 16px 0;padding:11px;width:calc(100% - 32px);
  background:transparent;border:1px solid var(--red);
  color:var(--red);font-family:'Rajdhani';font-size:13px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;
  transition:all 0.2s;
}
.go-btn:hover{background:var(--red);color:#000;}

/* legend */
#legend{padding:14px 20px;border-top:1px solid var(--border);}
.leg-lbl{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.leg-bar{height:8px;border-radius:2px;background:linear-gradient(90deg,rgb(30,10,40),rgb(80,20,100),rgb(140,30,160),rgb(200,60,80),rgb(255,80,100),rgb(255,160,40));}
.leg-ends{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px;}

#tip{
  position:fixed;pointer-events:none;display:none;z-index:99;
  background:rgba(5,5,15,0.96);border:1px solid var(--red);
  padding:7px 12px;font-size:11px;font-family:'Exo 2';color:var(--text);
}
.tip-n{font-family:'Rajdhani';font-size:16px;color:var(--red);letter-spacing:2px;}
.tip-v{color:var(--orange);font-weight:500;}
</style>
</head>

// Compute totals per geojson state name
const TOT={};
for(const[g,c]of Object.entries(NM)){const d=SC[c];if(d)TOT[g]=d['TOTAL IPC CRIMES'];}
const vals=Object.values(TOT).filter(v=>v>0);
const MIN=Math.min(...vals),MAX=Math.max(...vals);

function heat(v){
  if(!v)return'#06060f';
  const t=Math.pow((v-MIN)/(MAX-MIN),0.4);
 const S=[[30,10,40],[80,20,100],[140,30,160],[200,60,80],[255,80,100],[255,160,40]];
  const p=t*(S.length-1),i=Math.floor(p),j=Math.min(i+1,S.length-1),f=p-i;
  return`rgb(${Math.round(S[i][0]+f*(S[j][0]-S[i][0]))},${Math.round(S[i][1]+f*(S[j][1]-S[i][1]))},${Math.round(S[i][2]+f*(S[j][2]-S[i][2]))})`;
}

// Mercator project lon/lat → SVG x/y
function proj(lon,lat){
  const x=(lon-67)/(98-67)*760+20;
  const m=Math.log(Math.tan(Math.PI/4+lat*Math.PI/360));
  const mMx=Math.log(Math.tan(Math.PI/4+36*Math.PI/360));
  const mMn=Math.log(Math.tan(Math.PI/4+6*Math.PI/360));
  const y=(1-(m-mMn)/(mMx-mMn))*790+28;
  return[x,y];
}
function ring2d(c){return c.map((p,i)=>{const[x,y]=proj(p[0],p[1]);return(i?'L':'M')+x.toFixed(1)+','+y.toFixed(1);}).join(' ')+'Z';}
function geom2d(g){
  if(g.type==='Polygon')return g.coordinates.map(ring2d).join(' ');
  if(g.type==='MultiPolygon')return g.coordinates.flatMap(po=>po.map(ring2d)).join(' ');
  return'';
}

const svg=document.getElementById('map');
const NS='http://www.w3.org/2000/svg';
const tip=document.getElementById('tip');
let activeBtn=null;

GJ.features.forEach(feat=>{
  const gn=feat.properties.ST_NM;
  const cn=NM[gn];
  const d=cn?SC[cn]:null;
  const tot=d?d['TOTAL IPC CRIMES']:0;
  const el=document.createElementNS(NS,'path');
  el.setAttribute('d',geom2d(feat.geometry));
  el.setAttribute('fill',heat(tot));
  el.setAttribute('class','s-path');
  el.addEventListener('mouseenter',()=>{fillSidebar(gn,cn,d,tot);tip.style.display='block';tip.innerHTML=`<div class="tip-n">${gn}</div>Total IPC: <span class="tip-v">${tot?tot.toLocaleString():'N/A'}</span>`;});
  el.addEventListener('mousemove',e=>{tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';});
  el.addEventListener('mouseleave',()=>{tip.style.display='none';});
  el.addEventListener('click',()=>{if(cn)goDash(gn,cn);});
  svg.appendChild(el);
});

function fillSidebar(gn,cn,d,tot){
  const body=document.getElementById('sb-body');
  if(activeBtn){activeBtn.remove();activeBtn=null;}
  if(!d){body.innerHTML=`<div class="sb-state">${gn}</div><p style="color:var(--muted);font-size:11px;margin-top:12px;">No data available.</p>`;return;}
  const SHOW=['MURDER','RAPE','KIDNAPPING & ABDUCTION','ROBBERY','THEFT','RIOTS','HURT/GREVIOUS HURT','DOWRY DEATHS'];
  const rows=SHOW.map(c=>({n:c,v:d[c]||0})).sort((a,b)=>b.v-a.v);
  const mx=rows[0]?rows[0].v:1;
  body.innerHTML=`<div class="sb-state">${gn}</div><div class="sb-total">${tot.toLocaleString()}</div><div class="sb-lbl">Total IPC &middot; 2001&ndash;2012</div>${rows.map(r=>`<div class="bar-row"><div class="bar-meta"><span class="bn">${r.n}</span><span class="bv">${r.v.toLocaleString()}</span></div><div class="bar-t"><div class="bar-f" style="width:${(r.v/mx*100).toFixed(1)}%"></div></div></div>`).join('')}`;
  const btn=document.createElement('button');
  btn.className='go-btn';btn.textContent='OPEN SAFETY DASHBOARD →';
  btn.onclick=()=>goDash(gn,cn);
  document.getElementById('sidebar').insertBefore(btn,document.getElementById('legend'));
  activeBtn=btn;
}

function goDash(gn,cn){
  window.location.href = "http://127.0.0.1:5000/state/" + gn;
}
